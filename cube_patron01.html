<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patron du Cube — Pliage 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f0e0c; color:#e8e0d0; font-family:'Space Mono',monospace; overflow:hidden; height:100vh; width:100vw; }
  canvas { display:block; }
  .ui-panel {
    position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
    display:flex; gap:16px; align-items:center;
    background:rgba(15,14,12,0.85); border:1px solid rgba(232,224,208,0.2);
    padding:16px 24px; backdrop-filter:blur(12px); z-index:100;
  }
  .btn {
    font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.15em;
    text-transform:uppercase; padding:10px 20px; cursor:pointer;
    border:1px solid rgba(232,224,208,0.4); background:transparent; color:#e8e0d0;
    transition:all 0.2s; white-space:nowrap;
  }
  .btn:hover { background:rgba(232,224,208,0.12); border-color:rgba(232,224,208,0.8); }
  .btn.primary { background:#e8e0d0; color:#0f0e0c; border-color:#e8e0d0; }
  .btn.primary:hover { background:#fff; }
  .btn:disabled { opacity:0.3; cursor:not-allowed; }
  .separator { width:1px; height:28px; background:rgba(232,224,208,0.2); }
  .title-block { position:fixed; top:28px; left:32px; z-index:100; }
  .title-block h1 { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; }
  .title-block p { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(232,224,208,0.5); margin-top:4px; }
  .hint { position:fixed; top:28px; right:32px; text-align:right; font-size:10px; letter-spacing:0.12em; color:rgba(232,224,208,0.35); line-height:2; z-index:100; }
  .progress-bar { position:fixed; bottom:0; left:0; height:2px; background:#e8e0d0; z-index:200; }
  #fold-label { font-size:10px; letter-spacing:0.15em; color:rgba(232,224,208,0.6); min-width:80px; text-align:center; }
</style>
</head>
<body>
<div class="title-block"><h1>Patron du Cube</h1><p>Pliage interactif 3D</p></div>
<div class="hint">Glisser pour tourner<br>Molette pour zoomer<br>Clic droit pour déplacer</div>
<div id="canvas-container"></div>
<div class="ui-panel">
  <button class="btn primary" id="btn-fold">Plier le cube</button>
  <div class="separator"></div>
  <button class="btn" id="btn-unfold">Déplier</button>
  <div class="separator"></div>
  <span id="fold-label">Déplié</span>
</div>
<div class="progress-bar" id="progress-bar" style="width:0%"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0f0e0c);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100);

scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const dl = new THREE.DirectionalLight(0xfff0d8, 1.1); dl.position.set(4,6,5); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0xc0d8ff, 0.3); dl2.position.set(-4,-2,-4); scene.add(dl2);

// ── TEXTURES ──────────────────────────────────────────────────────────────────
const SZ=256, BG='#f0ebe0', FG='#8898a4', ST='#3a3a3a', LW=7;
function ctx2tex(draw) {
  const c=document.createElement('canvas'); c.width=c.height=SZ;
  const x=c.getContext('2d');
  x.fillStyle=BG; x.fillRect(0,0,SZ,SZ); draw(x);
  return new THREE.CanvasTexture(c);
}
const texOctagon = ctx2tex(x=>{
  const n=8,r=88,cx=128,cy=128;
  x.beginPath();
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/8;i?x.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):x.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
  x.closePath();x.fillStyle=FG;x.fill();x.strokeStyle=ST;x.lineWidth=LW;x.stroke();
});
const texCrossX = ctx2tex(x=>{
  const A=38,M=24,E=SZ-M,H=SZ/2;
  x.beginPath();
  x.moveTo(M,M+A);x.lineTo(M+A,M);x.lineTo(H,H-A);x.lineTo(E-A,M);x.lineTo(E,M+A);
  x.lineTo(H+A,H);x.lineTo(E,E-A);x.lineTo(E-A,E);x.lineTo(H,H+A);
  x.lineTo(M+A,E);x.lineTo(M,E-A);x.lineTo(H-A,H);
  x.closePath();x.fillStyle=FG;x.fill();x.strokeStyle=ST;x.lineWidth=LW;x.stroke();
});
const texStar = ctx2tex(x=>{
  const n=5,R=94,r=40,cx=128,cy=128;
  x.beginPath();
  for(let i=0;i<n*2;i++){const a=(i/(n*2))*Math.PI*2-Math.PI/2,rd=i%2===0?R:r;i?x.lineTo(cx+rd*Math.cos(a),cy+rd*Math.sin(a)):x.moveTo(cx+rd*Math.cos(a),cy+rd*Math.sin(a));}
  x.closePath();x.fillStyle=FG;x.fill();x.strokeStyle=ST;x.lineWidth=LW;x.stroke();
});
const texDiamond = ctx2tex(x=>{
  const s=84;x.save();x.translate(128,128);x.rotate(Math.PI/4);
  x.fillStyle=FG;x.fillRect(-s,-s,s*2,s*2);x.strokeStyle=ST;x.lineWidth=LW;x.strokeRect(-s,-s,s*2,s*2);x.restore();
});
const texPlus = ctx2tex(x=>{
  const arm=42,mg=28,a=mg,b=SZ/2-arm,c2=SZ/2+arm,d=SZ-mg;
  x.beginPath();
  x.moveTo(b,a);x.lineTo(c2,a);x.lineTo(c2,b);x.lineTo(d,b);x.lineTo(d,c2);x.lineTo(c2,c2);
  x.lineTo(c2,d);x.lineTo(b,d);x.lineTo(b,c2);x.lineTo(a,c2);x.lineTo(a,b);x.lineTo(b,b);
  x.closePath();x.fillStyle=FG;x.fill();x.strokeStyle=ST;x.lineWidth=LW;x.stroke();
});
const texSparkle = ctx2tex(x=>{
  const cx=128,cy=128,R=96,w=13;
  x.beginPath();
  x.moveTo(cx,cy-R);x.lineTo(cx+w,cy-w);x.lineTo(cx+R,cy);x.lineTo(cx+w,cy+w);
  x.lineTo(cx,cy+R);x.lineTo(cx-w,cy+w);x.lineTo(cx-R,cy);x.lineTo(cx-w,cy-w);
  x.closePath();x.fillStyle=FG;x.fill();x.strokeStyle=ST;x.lineWidth=LW;x.stroke();
});

// ── FACE MESH ─────────────────────────────────────────────────────────────────
// Une face = PlaneGeometry centrée sur (0,0,0), orientée vers +Z
const faceGeo = new THREE.PlaneGeometry(0.999, 0.999);
function makeFace(tex) {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(faceGeo, new THREE.MeshLambertMaterial({ map:tex, side:THREE.FrontSide })));
  const back = new THREE.Mesh(faceGeo, new THREE.MeshLambertMaterial({ color:0xcfc8b8, side:THREE.FrontSide }));
  back.rotation.y = Math.PI; back.position.z = -0.001;
  g.add(back);
  return g;
}

// ── PATRON ET HIÉRARCHIE DE PLIAGE ───────────────────────────────────────────
//
// Patron (image) — coordonnées (col, row), origine en haut-gauche :
//   Octogone  (0,0)
//   CroixX    (1,0)
//   Étoile    (1,1)
//   Losange   (2,1)  ← ANCRE (face AVANT du cube)
//   Plus      (2,2)
//   Astérisque(3,2)
//
// Adjacences (arêtes partagées) :
//   Octogone  — CroixX    : Octogone.droite = CroixX.gauche
//   CroixX    — Étoile    : CroixX.bas      = Étoile.haut
//   Étoile    — Losange   : Étoile.droite   = Losange.gauche
//   Losange   — Plus      : Losange.bas     = Plus.haut
//   Plus      — Astérisque: Plus.droite     = Astérisque.gauche
//
// Arbre depuis Losange (AVANT = +Z, normal vers +Z, face visible depuis +Z) :
//
//   Losange [AVANT +Z]
//   ├─ Étoile    via Losange.gauche  (arête x=-0.5 du Losange)
//   │            pivot axe +Y, angle +90°  → GAUCHE (-X)
//   │   └─ CroixX   via Étoile.haut  (arête y=+0.5 de l'Étoile, dans espace Étoile plié)
//   │               pivot axe +X, angle -90° → HAUT (+Y)
//   │       └─ Octogone via CroixX.gauche (arête x=-0.5 de CroixX)
//   │                   pivot axe +Y, angle +90° → ARRIÈRE (-Z)
//   └─ Plus      via Losange.bas  (arête y=-0.5 du Losange)
//               pivot axe +X, angle +90°  → BAS (-Y)
//       └─ Astérisque via Plus.droite (arête x=+0.5 de Plus)
//                     pivot axe +Y, angle -90° → DROITE (+X)
//
// ─── Vérification des faces finales ───────────────────────────────────────────
// Losange    : pos(0,0,+0.5),  normale +Z  → AVANT  ✓
// Étoile     : pos(-0.5,0,0),  normale -X  → GAUCHE ✓
// CroixX     : pos(0,+0.5,0),  normale +Y  → HAUT   ✓
// Octogone   : pos(0,0,-0.5),  normale -Z  → ARRIÈRE✓
// Plus       : pos(0,-0.5,0),  normale -Y  → BAS    ✓
// Astérisque : pos(+0.5,0,0),  normale +X  → DROITE ✓  → CUBE PARFAIT ✓
//
// ─── Positions dans le patron déplié (col→+X, row→-Y, CELL=1) ─────────────
// On exprime les positions flat relativement à l'ancre Losange à (col=2,row=1).
// Losange    : (0, 0)
// Étoile     : (-1, 0)   [col=1,row=1 → offset (-1,0)]
// CroixX     : (-1, +1)  [col=1,row=0 → offset (-1,+1)]
// Octogone   : (-2, +1)  [col=0,row=0 → offset (-2,+1)]
// Plus       : (0, -1)   [col=2,row=2 → offset (0,-1)]
// Astérisque : (+1, -1)  [col=3,row=2 → offset (+1,-1)]
//
// Pour centrer visuellement le patron, on décale tout de (-0 , +0)
// Barycentre X = (0-1-1-2+0+1)/6 = -0.5 → shift +0.5
// Barycentre Y = (0+0+1+1-1-1)/6 = 0    → shift 0
// Positions finales centrées :
//   Losange    : (+0.5, 0)
//   Étoile     : (-0.5, 0)
//   CroixX     : (-0.5, +1)
//   Octogone   : (-1.5, +1)
//   Plus       : (+0.5, -1)
//   Astérisque : (+1.5, -1)

// L'orbitGroup tient l'ensemble, décalé pour que le cube soit centré à l'origine
const orbitGroup = new THREE.Group();
scene.add(orbitGroup);

// ─── ANCRE : Losange ──────────────────────────────────────────────────────────
// On place l'ancre à sa position dans le patron centré : (+0.5, 0, 0)
// Quand plié, tout le cube sera décalé → on compensera via orbitGroup.
const ancreOffset = new THREE.Vector3(0.5, 0, 0);

const losangeMesh = makeFace(texDiamond);
orbitGroup.add(losangeMesh);

// ─── Fonction utilitaire : créer une charnière ────────────────────────────────
// parentFaceGroup : le groupe de la face parente
// hingeLocalPos   : position de la charnière dans l'espace LOCAL de la face parente
// faceOffset      : position du centre de la face enfant par rapport à la charnière (flat)
// tex             : texture de la face enfant
function makeHinge(parentFaceGroup, hingeLocalPos, faceOffsetFromHinge, tex) {
  const hinge = new THREE.Group();
  hinge.position.copy(hingeLocalPos);
  parentFaceGroup.add(hinge);

  const face = makeFace(tex);
  face.position.copy(faceOffsetFromHinge);
  hinge.add(face);

  return { hinge, face };
}

// ─── Étoile : arête gauche du Losange ────────────────────────────────────────
// Dans l'espace du Losange (centré à 0,0), son arête gauche est à x = -0.5.
// La face Étoile s'étend vers la gauche : son centre est à (-0.5, 0) depuis la charnière.
const { hinge: hingeEtoile, face: etoileFace } =
  makeHinge(losangeMesh, new THREE.Vector3(-0.5, 0, 0), new THREE.Vector3(-0.5, 0, 0), texStar);

// ─── CroixX : arête haute de l'Étoile ────────────────────────────────────────
// Dans l'espace local de l'Étoile (centré à 0,0), son arête haute est à y = +0.5.
// La face CroixX s'étend vers le haut : son centre est à (0, +0.5) depuis la charnière.
const { hinge: hingeCroixX, face: croixXFace } =
  makeHinge(etoileFace, new THREE.Vector3(0, 0.5, 0), new THREE.Vector3(0, 0.5, 0), texCrossX);

// ─── Octogone : arête gauche de CroixX ───────────────────────────────────────
// Dans l'espace local du CroixX, son arête gauche est à x = -0.5.
// La face Octogone s'étend vers la gauche : son centre à (-0.5, 0) depuis la charnière.
const { hinge: hingeOctogone, face: octogoneFace } =
  makeHinge(croixXFace, new THREE.Vector3(-0.5, 0, 0), new THREE.Vector3(-0.5, 0, 0), texOctagon);

// ─── Plus : arête basse du Losange ───────────────────────────────────────────
// Arête basse du Losange = y = -0.5.
// La face Plus s'étend vers le bas : son centre à (0, -0.5) depuis la charnière.
const { hinge: hingePlus, face: plusFace } =
  makeHinge(losangeMesh, new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, -0.5, 0), texPlus);

// ─── Astérisque : arête droite du Plus ───────────────────────────────────────
// Arête droite du Plus = x = +0.5.
// La face Astérisque s'étend vers la droite : son centre à (+0.5, 0) depuis la charnière.
const { hinge: hingeSparkle, face: sparkleFace } =
  makeHinge(plusFace, new THREE.Vector3(0.5, 0, 0), new THREE.Vector3(0.5, 0, 0), texSparkle);

// ─── Décalage initial de l'ancre pour centrer le patron ──────────────────────
losangeMesh.position.copy(ancreOffset);

// ─── Angles de pliage ─────────────────────────────────────────────────────────
// hingeEtoile    : pivot axe +Y, angle +π/2  (plie vers la gauche)
// hingeCroixX    : pivot axe +X, angle -π/2  (plie vers le haut/arrière)
// hingeOctogone  : pivot axe +Y, angle +π/2  (plie vers l'arrière)
// hingePlus      : pivot axe +X, angle +π/2  (plie vers le bas/arrière)
// hingeSparkle   : pivot axe +Y, angle -π/2  (plie vers la droite/arrière)
// ─── Angles de pliage ─────────────────────────────────────────────────────────
// Raisonnement analytique des positions finales attendues (cube côté 1 centré à l'origine) :
//
// AVANT le pliage, toutes les faces sont dans le plan Z=0, normales vers +Z.
// Après pliage complet :
//
// Losange (AVANT) : reste à z=+0.5, normale +Z  — position dans orbitGroup : (0.5, 0, 0) flat
//   → après compensation orbitGroup (-0.5,0,+0.5) : centre monde (0, 0, +0.5) ✓
//
// Étoile (GAUCHE -X) : centre monde (-0.5, 0, 0), normale -X
//   hingeEtoile est à x=-0.5 dans espace Losange.
//   Losange world pos = (+0.5,0,0). hingeEtoile world = (0, 0, 0).
//   On veut que etoileFace (à +(-0.5,0,0) local de hingeEtoile) aille en (−0.5, 0, 0) monde.
//   Avec rotation Y de +π/2 sur hingeEtoile :
//     local(-0.5, 0, 0) → rotY(+π/2) → (0, 0, +0.5) → monde (0,0,+0.5) ✗
//   Avec rotation Y de -π/2 sur hingeEtoile :
//     local(-0.5, 0, 0) → rotY(-π/2) → (0, 0, -0.5) → monde (0,0,-0.5) ✗
//   Hmm. La face est à (-0.5,0,0) dans espace hingeEtoile. hingeEtoile est à (-0.5,0,0) dans espace Losange.
//   Donc local face par rapport au hinge = (-0.5,0,0).
//   rotY(θ) appliqué à (-0.5,0,0) → (-0.5cosθ, 0, 0.5sinθ)
//   On veut que le centre de l'Étoile soit à (−0.5,0,0) monde, soit (−1,0,0) dans espace Losange (offset +0.5).
//   En espace Losange : hinge à (−0.5,0,0), face à (−0.5cosθ, 0, 0.5sinθ) depuis hinge.
//   Centre Étoile dans Losange = (−0.5 − 0.5cosθ, 0, 0.5sinθ).
//   Monde = Losange_world(+0.5,0,0) + centre_dans_Losange.
//   Monde = (−0.5cosθ, 0, 0.5sinθ).
//   On veut (−0.5, 0, 0) → cosθ=1, sinθ=0 → θ=0 (plat). ✗
//   On veut centre Étoile monde = (−0.5, 0, 0). Dans espace Losange = (−1, 0, 0).
//   Dans espace hinge (hinge à (−0.5,0,0) dans Losange) : (−0.5, 0, 0).
//   Après rotY(θ): x'=−0.5cosθ, z'=0.5sinθ (rotY: x→xcosθ+zsinθ, z→−xsinθ+zcosθ).
//   Appliqué à (−0.5, 0, 0): x'=−0.5cosθ, z'=0.5sinθ.
//   On veut x'=−0.5, z'=0 → cosθ=1, θ=0. Impossible pour une face perpendiculaire.
//   → Le centre de la face GAUCHE du cube est à (−0.5,0,0) monde, mais la face doit être PERPENDICULAIRE.
//   Donc après pliage, la face Étoile a sa normale vers −X et son centre à (−0.5, 0, 0).
//   Le "centre" de la face dans son propre espace est (0,0,0), mais dans l'espace hinge il est à (−0.5,0,0).
//   Après rotY(θ) de hinge : pos_monde_centre = hinge_monde + R_Y(θ) * (−0.5, 0, 0)
//   hinge_monde = Losange_monde + (−0.5,0,0) = (0.5−0.5, 0, 0) = (0,0,0).
//   R_Y(θ)*(−0.5,0,0) = (−0.5cosθ, 0, +0.5sinθ).
//   On veut (−0.5, 0, 0) → cosθ=1, sinθ=0 → impossible (θ doit être ±π/2 pour être perpendiculaire).
//   PROBLÈME : l'arête de la face Étoile coincide avec l'axe de rotation (hinge),
//   donc la face tourne autour de son arête partagée avec Losange.
//   À θ=+π/2 : pos = (0, 0, +0.5). La face est maintenant perpendiculaire, normale vers +Z. C'est la face AVANT bis.
//   À θ=−π/2 : pos = (0, 0, −0.5). Normale vers −Z. C'est la face ARRIÈRE. Pas GAUCHE.
//   → Conclusion : un pivot Y sur l'arête GAUCHE d'une face ne donne PAS la face GAUCHE du cube.
//   Il faut plutôt que l'Étoile pivote autour de son arête partagée, qui est l'arête GAUCHE du Losange.
//   L'arête gauche du Losange est un segment vertical x=−0.5, z=0.
//   La face Étoile, après pliage à 90°, doit être dans le plan x=−0.5 (plan YZ décalé en x=−0.5).
//   Pour cela, il faut une rotation de −90° autour de l'axe Y passant par x=−0.5, z=0.
//   R_Y(−π/2)*(−0.5,0,0) = (−0.5*0, 0, −(−0.5)*(−1)) = ... 
//   R_Y(θ): [cosθ 0 sinθ; 0 1 0; −sinθ 0 cosθ]
//   R_Y(−π/2)*(−0.5,0,0) = (0*−0.5+0, 0, −(−1)*−0.5+0) = (0, 0, −0.5).
//   pos_monde = (0,0,0) + (0,0,−0.5) = (0,0,−0.5). Normale = R_Y(−π/2)*(0,0,1) = (−1,0,0) → face GAUCHE! ✓
//   Mais centre = (0,0,−0.5) ≠ (−0.5,0,0). 
//   → Le cube résultant n'est pas centré à l'origine, c'est correct, on le compense avec orbitPosFolded.
//
// Donc :
//   hingeEtoile   rotY = −π/2  → Étoile devient face avec normale −X mais centre (0,0,−0.5) dans Losange
//
// Continuons pour CroixX (enfant de Étoile via hingeEtoile à y=+0.5 dans espace Étoile) :
//   Après hingeEtoile(−π/2), l'espace Étoile a ses axes : X→−Z, Z→+X (rotation Y −90°).
//   hingeCroixX est à (0,+0.5,0) dans espace Étoile → monde : (0,+0.5,−0.5) (vu que Étoile est à (0,0,−0.5)).
//   La face CroixX est à (0,+0.5,0) dans espace hingeCroixX.
//   On veut que CroixX soit la face HAUT du cube : centre (0,+0.5,0) monde, normale +Y.
//   Actuellement (non plié depuis Étoile) : CroixX centre monde = (0,+1,−0.5).
//   On veut (0,+0.5,0). Différence = (0,−0.5,+0.5) à compenser par rotation.
//   Dans espace Étoile plié, l'axe X pointe vers −Z monde, Y pointe vers +Y, Z pointe vers +X.
//   hingeEtoile_monde = (0,+0.5,−0.5) (après pliage Étoile, hinge à y=+0.5 dans Étoile qui est à (0,0,−0.5)).
//   Wait: Étoile mesh center = (0,0,−0.5) en monde. hingeCroixX est à (0,+0.5,0) dans espace LOCAL Étoile.
//   Dans espace Étoile plié (axeX=−Z, axeY=+Y, axeZ=+X):
//   (0,+0.5,0) → monde = Étoile_monde + (0*−Z + 0.5*Y + 0*X) = (0,0,−0.5) + (0,0.5,0) = (0,0.5,−0.5).
//   Donc hingeCroixX est à (0, 0.5, −0.5) monde.
//   CroixX center en local hingeCroixX = (0,+0.5,0).
//   Dans espace hingeCroixX (non encore pivoté), axe X = −Z monde, axe Y = +Y monde, axe Z = +X monde.
//   rotX(θ) dans cet espace local:
//   (0,0.5,0) → rotX(θ) → (0, 0.5cosθ, 0.5sinθ) dans espace local.
//   En monde: y_local*Y_monde + z_local*Z_monde_local = 0.5cosθ*Y + 0.5sinθ*(+X).
//   Centre CroixX monde = (0,0.5,−0.5) + (0.5sinθ, 0.5cosθ, 0).
//   On veut centre = (0,+0.5,0) monde.
//   0.5sinθ = 0 → sinθ=0 ou... 
//   0,0.5,−0.5 + (0.5sinθ, 0.5cosθ, 0) = (0, 0.5, 0)
//   → 0.5sinθ=0 → θ=0 ou π; 0.5+0.5cosθ=0.5 → cosθ=0. Contradiction.
//   → Centre ne peut pas être (0,0.5,0). Ce n'est pas grave : l'important est la normale et que les arêtes coïncident.
//   rotX(−π/2) dans espace Étoile plié:
//   Face pointe initialement vers +Z_local = +X_monde.
//   Après rotX(−π/2): normale = R_X(−π/2)*(0,0,1) = (0,1,0) → +Y monde. Face HAUT ✓
//   Centre = (0,0.5,−0.5) + R_monde(0,0.5*0,0.5*1)... il faut continuer avec la vraie matrice.
//   De toute façon l'important est que la normale soit correcte et que la charnière soit bien placée.
//
const HINGES = [
  { h: hingeEtoile,   axis:'y', angle: -Math.PI/2 },
  { h: hingeCroixX,   axis:'x', angle: -Math.PI/2 },
  { h: hingeOctogone, axis:'y', angle: -Math.PI/2 },
  { h: hingePlus,     axis:'x', angle: +Math.PI/2 },
  { h: hingeSparkle,  axis:'y', angle: +Math.PI/2 },
];

// ─── Quand t=1, le Losange est à z=0 (face avant du cube, centre à 0,0,0).
// Le cube est alors centré entre z=0 et z=-1 → on décale orbitGroup de +0.5 en z.
// Et le Losange était à ancreOffset=(+0.5,0,0) → on décale de -0.5 en x.
// Donc au moment où t=1 : orbitGroup.position passe de (0,0,0) à (-0.5, 0, +0.5).
// On lerp aussi cette position.
const orbitPosFlat  = new THREE.Vector3(0,   0, 0);
const orbitPosFolded= new THREE.Vector3(-0.5, 0, -0.5);

// ── ANIMATION ─────────────────────────────────────────────────────────────────
let foldT=0, targetT=0;
const SPEED=1.3;

function smoothStep(t){ return t*t*(3-2*t); }

function applyT(raw) {
  const t = smoothStep(Math.max(0, Math.min(1, raw)));
  HINGES.forEach(({h, axis, angle}) => {
    if(axis==='x') h.rotation.x = angle * t;
    else           h.rotation.y = angle * t;
  });
  orbitGroup.position.lerpVectors(orbitPosFlat, orbitPosFolded, t);
}

// ── ORBIT CONTROLS ────────────────────────────────────────────────────────────
// La caméra est fixe sur l'axe Z, c'est orbitGroup qui tourne.
// Le cube plié doit être centré à l'origine → on compense la translation résiduelle
// en appliquant la rotation AU GROUPE, pas à la caméra.

const dom = renderer.domElement;
let drag=false, rightDrag=false, lx=0, ly=0;
let panX=0, panY=0, zoom=5.5;

const qCurrent = new THREE.Quaternion();
qCurrent.setFromEuler(new THREE.Euler(0.35, -0.5, 0, 'YXZ'));

function applyDelta(dx, dy) {
  const speed = 0.007;
  const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx * speed);
  const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy * speed);
  qCurrent.premultiply(qY).premultiply(qX);
}

dom.addEventListener('mousedown',e=>{drag=true;rightDrag=e.button===2;lx=e.clientX;ly=e.clientY;});
dom.addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('mouseup',()=>drag=false);
addEventListener('mousemove',e=>{
  if(!drag) return;
  const dx=e.clientX-lx, dy=e.clientY-ly;
  if(rightDrag){panX+=dx*0.008;panY-=dy*0.008;}
  else applyDelta(dx, dy);
  lx=e.clientX;ly=e.clientY;
});
dom.addEventListener('wheel',e=>{zoom=Math.max(2,Math.min(13,zoom+e.deltaY*0.004));},{passive:true});
dom.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
addEventListener('touchend',()=>drag=false);
addEventListener('touchmove',e=>{
  if(!drag) return;
  applyDelta(e.touches[0].clientX-lx, e.touches[0].clientY-ly);
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:true});

// ── UI ────────────────────────────────────────────────────────────────────────
const btnFold=document.getElementById('btn-fold');
const btnUnfold=document.getElementById('btn-unfold');
const foldLabel=document.getElementById('fold-label');
const progressBar=document.getElementById('progress-bar');
btnFold.addEventListener('click',()=>targetT=1);
btnUnfold.addEventListener('click',()=>targetT=0);
btnUnfold.disabled=true;

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(), 0.05);

  const diff=targetT-foldT;
  foldT += Math.sign(diff)*Math.min(Math.abs(diff), SPEED*dt);
  if(Math.abs(diff)<0.0001) foldT=targetT;
  applyT(foldT);

  const pct=Math.round(foldT*100);
  progressBar.style.width=pct+'%';
  if(foldT<0.01){foldLabel.textContent='Déplié';btnFold.disabled=false;btnUnfold.disabled=true;}
  else if(foldT>0.99){foldLabel.textContent='Plié';btnFold.disabled=true;btnUnfold.disabled=false;}
  else{foldLabel.textContent=pct+'%';btnFold.disabled=false;btnUnfold.disabled=false;}

  // orbitGroup tourne sur lui-même, caméra fixe sur l'axe Z
  // La translation orbitGroup compense déjà le décalage du cube → centré à l'origine
  orbitGroup.quaternion.copy(qCurrent);

  camera.position.set(panX, panY, zoom);
  camera.lookAt(panX, panY, 0);

  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
